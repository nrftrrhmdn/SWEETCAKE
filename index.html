<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Sweet Treats</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header>
  <h1>Sweet Treats</h1>
  <nav>
    <a href="#home">Home</a>
    <a href="#menu">Menu</a>
  </nav>
</header>

<!-- HOME -->
<section id="home" class="home">
  <div class="home-text">
    <h2>Sweet Treats & Refreshing Drinks</h2>
    <p>
      Pilihan terbaik untuk pencinta dessert dan minuman segar.
      Nikmati waktu santai bersama kami!
    </p>
    <button onclick="scrollToMenu()">Order Now</button>
  </div>
</section>

<!-- MENU -->
<section id="menu" class="menu">
  <h2>Menu Kami</h2>

  <div class="menu-container">

    <!-- CAKE -->
    <div class="card">
      <img src="images/strawberry.jpg"">
      <h3>Strawberry Cake</h3>
      <p>28k</p>
      <button>Pesan Sekarang</button>
    </div>

    <div class="card">
      <img src="images/cheescake.jpg">
      <h3>Chocolate Cake</h3>
      <p>32k</p>
      <button>Pesan Sekarang</button>
    </div>

    <div class="card">
      <img src="images/tiramisu.jpg" alt="">
      <h3>Cheesecake</h3>
      <p>30k</p>
      <button>Pesan Sekarang</button>
    </div>

    <!-- DRINK -->
    <div class="card">
      <img src="images/minuman 2.jpg" alt="">
      <h3>Chocolate Latte</h3>
      <p>24k</p>
      <button>Pesan Sekarang</button>
    </div>

    <div class="card">
      <img src="images/minuman 4.jpg" alt="">
      <h3>Strawberry Latte</h3>
      <p>22k</p>
      <button>Pesan Sekarang</button>
    </div>

    <div class="card">
      <img src="images/minuman 1.jpg" alt="">
      <h3>Cappuccino</h3>
      <p>26k</p>
      <button>Pesan Sekarang</button>
    </div>

  </div>
</section>

<script src="script.js"></script>
</body>
</html>
